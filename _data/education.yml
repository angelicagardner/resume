  awards:
    - award: Degree Project (Grade A) - Conducted ML experiments with Sacred to compare the performance in detecting deepfakes between ensembles of CNNs and individual models. I used the Deepfake Detection Challenge dataset from Kaggle and the following CNN architectures in PyTorch; VGG16, VGG19, ResNet50 and Xception. 

